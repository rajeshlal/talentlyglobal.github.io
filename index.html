
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talently Global - AI Workforce Solutions & Enterprise Integration</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body, html {margin:0;padding:0;width:100%;height:100%}
    .tg-root{font-family:'Montserrat',sans-serif;background:#F8F7F3;color:#0C0C0C;-webkit-font-smoothing:antialiased;min-height:100vh}
    .tg-root button{cursor:pointer;font-family:'Montserrat',sans-serif}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
  </style>
</head>
<body>
  <div id="tg-app"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect} = React;
const h = React.createElement;

const A='#C84B2D', BG='#F8F7F3', TEXT='#0C0C0C', MUT='#6A6A6A', DARK='#0C0C0C', MID='#ECEAE4', BRD='rgba(12,12,12,0.11)';

const montserrat = {fontFamily:"'Montserrat',sans-serif"};

const BTN = {background:A,color:'#fff',border:'none',borderRadius:2,padding:'11px 26px',fontSize:13,fontWeight:500,letterSpacing:'0.02em',cursor:'pointer'};
const BTNOUT = {background:'transparent',color:TEXT,border:`1px solid ${BRD}`,borderRadius:2,padding:'11px 26px',fontSize:13,fontWeight:500,cursor:'pointer'};
const BTNOUTDK = {background:'transparent',color:'#F8F7F3',border:'1px solid rgba(248,247,243,0.3)',borderRadius:2,padding:'11px 26px',fontSize:13,fontWeight:500,cursor:'pointer'};

const HEADLINE = {h1:'Most businesses are leaving growth on the table.', accent:'We help you take it back.', sub:'AI workforce solutions, enterprise integrations, and strategic consulting — all built around your outcomes, not our service menu.'};

const OUTCOMES = [
  {icon:'○', title:'Scale without headcount', body:'Deploy AI agents that work like high-performing employees — 24/7, no ramp time, no overhead.', page:'ai-agents'},
  {icon:'○', title:'Systems that talk to each other', body:'End data silos with enterprise integrations that connect your entire stack to one source of truth.', page:'integrations'},
  {icon:'○', title:'Pipeline that converts', body:'Demand generation and marketing built around revenue, not impressions or vanity metrics.', page:'marketing'},
  {icon:'○', title:'Strategy backed by data', body:'Consulting grounded in analytics and operational reality — with embedded execution support.', page:'consulting'},
  {icon:'○', title:'AI across your entire business', body:'Full-stack AI infrastructure that compounds — not a chatbot, a complete operational layer.', page:'fullstack'}
];

const AUDIENCES = [
  {id:'founder', label:'Founder / CEO', h:'You\'re growing, but your team is already maxed out.', b:'We deploy AI agents that handle the high-volume, repetitive work — so your best people focus on what actually moves the business. No hiring cycles, no ramp time. You start seeing results in weeks, not quarters. And the gains compound.'},
  {id:'ops', label:'Ops / IT', h:'Your systems don\'t talk to each other. Yet.', b:'We build enterprise integrations that connect your CRM, ERP, data warehouse, and operational tools — so your team has one source of truth and workflows that actually flow. No more manual reconciliation. No more version-of-the-truth arguments.'},
  {id:'cmo', label:'CMO / Growth', h:'More budget going in. Not enough revenue coming out.', b:'We build and run marketing programs designed around conversion, not activity. AI-assisted content, intelligent targeting, and attribution that tells you exactly what drove the deal — so every dollar earns its place in the budget.'},
  {id:'csuite', label:'C-Suite / PE', h:'You need a strategy you can actually execute.', b:'Our consulting is grounded in your data, operational reality, and AI-enabled analysis. We build the roadmap — and then we stay in the work with your team through implementation. Accountable consulting with outcomes you can measure and report.'}
];

const SOLDATA = {
  'ai-agents':{
    label:'AI Workforce Solutions',
    h1:'Scale without adding headcount.',
    sub:'Deploy AI agents that handle real work — autonomously, reliably, and around the clock.',
    problem:{h:'The hiring ceiling is real.',b:'Hiring is slow, expensive, and risky. But the work keeps growing. Most businesses hit a wall where the only answer seems to be more people — but more people means more management, more overhead, and more points of failure. There\'s a better way.'},
    solution:{h:'AI agents that work like your best employees.',b:'We build and deploy AI agents that function like high-performing team members. They handle intake, outreach, data processing, reporting, customer interactions, scheduling, and dozens of other workflows — without turnover, vacation days, or onboarding time.'},
    outcomes:['Reduce operational overhead by 30–50%','Deploy in weeks, not quarters','24/7 execution with zero supervision required','Scales to volume without linear cost increase'],
    uses:['Sales outreach and lead qualification automation','Customer service and support triage','Internal reporting and data processing pipelines','Onboarding, intake, and document workflows']
  },
  'integrations':{
    label:'Enterprise Integration',
    h1:'Make your systems actually work together.',
    sub:'Connect your stack. Eliminate silos. Operate from one reliable source of truth.',
    problem:{h:'Disconnected tools are costing you more than you think.',b:'The average mid-market company runs 7–12 disconnected software tools. Data lives in different places. Teams work from different versions of the truth. Every manual transfer is a delay, an error, and an invisible cost — and it compounds daily.'},
    solution:{h:'Integrations that stick.',b:'We design and implement enterprise integrations that connect your CRM, ERP, data warehouse, marketing stack, and operational tools into a unified, reliable system. Real-time data flow. Automated workflows. One version of the truth across every team.'},
    outcomes:['Eliminate manual data reconciliation entirely','Reduce process cycle time by 40–60%','Improve data accuracy and reporting confidence','Enable real-time operational visibility across teams'],
    uses:['CRM to ERP data synchronization','Marketing stack to revenue attribution pipeline','Operational dashboards and cross-system reporting','Custom API architecture and webhook infrastructure']
  },
  'marketing':{
    label:'Growth Marketing',
    h1:'Build pipeline that actually converts.',
    sub:'Demand generation and marketing built around revenue — not impressions, clicks, or open rates.',
    problem:{h:'Marketing that can\'t prove ROI is a cost center.',b:'Most marketing programs optimize for activity — posts, clicks, impressions, opens. But activity doesn\'t pay the bills. If your marketing can\'t tell you what drove a closed deal, it\'s making expensive guesses with your budget.'},
    solution:{h:'Revenue-first marketing, AI-accelerated.',b:'We build marketing programs powered by AI content generation, intelligent targeting, and attribution that actually works. Every dollar tracked to outcomes. Every campaign engineered to convert. No vanity metrics. No black-box reporting.'},
    outcomes:['Attributable pipeline within 90 days','AI-accelerated content production at scale','Multi-channel targeting and sequencing','Full-funnel visibility from first click to close'],
    uses:['B2B demand generation programs','Content strategy and AI-assisted production','Paid media management and optimization','CRM, automation, and attribution setup']
  },
  'consulting':{
    label:'Strategic Consulting',
    h1:'Strategy backed by data. Execution built in.',
    sub:'The roadmap and the team to run it — grounded in analytics, not assumptions.',
    problem:{h:'Most consulting ends when the deck is delivered.',b:'You get a strategy that\'s theoretically sound and practically useless — because the people who built it don\'t have to live with the results. The gap between insight and execution is where most initiatives quietly die.'},
    solution:{h:'Consulting you can hold accountable.',b:'We build strategic roadmaps grounded in your actual data, operational reality, and AI-enabled analysis. Then we stay in the work — alongside your team — through implementation. You get accountable consulting tied to outcomes you can measure and report, not a deliverable and a goodbye.'},
    outcomes:['Data-driven strategic clarity and alignment','Executable roadmaps with defined milestones','Embedded implementation support — not just advisory','Measurable outcomes tied to business metrics'],
    uses:['Organizational efficiency and operational redesign','Go-to-market strategy and revenue architecture','Digital and AI transformation roadmapping','M&A integration planning and execution']
  },
  'fullstack':{
    label:'Full-Stack AI Deployment',
    h1:'An AI layer across your entire business.',
    sub:'Not a chatbot. A complete AI infrastructure built for how you actually operate.',
    problem:{h:'Tactical AI doesn\'t compound. Strategic AI does.',b:'Most companies approach AI tactically — a chatbot here, an automation there. The result is a patchwork that doesn\'t scale, doesn\'t integrate, and doesn\'t deliver the step-change in performance that AI actually makes possible when deployed with intention.'},
    solution:{h:'Full-stack AI infrastructure from strategy to execution.',b:'We architect and deploy AI infrastructure across your operations, sales, marketing, finance, and customer-facing functions. Purpose-built agents, integrated data flows, decision-intelligence dashboards, and the human expertise to make it all compound over time.'},
    outcomes:['AI deployed across all major business functions','Compounding efficiency and intelligence gains','Scalable infrastructure, not one-off point solutions','Full visibility into AI performance, usage, and ROI'],
    uses:['Enterprise AI strategy and architecture design','Multi-agent workflow orchestration','AI-powered decision intelligence and analytics','AI governance, monitoring, and performance management']
  }
};

function Divider(){return h('div',{style:{height:1,background:BRD,margin:'0'}})}

function Tag({children}){return h('span',{style:{fontSize:11,fontWeight:500,letterSpacing:'0.12em',textTransform:'uppercase',color:A}},children)}

function Nav({page,setPage}){
  const [open,setOpen]=useState(false);
  const sols=[
    {id:'ai-agents',l:'Scale without headcount'},
    {id:'integrations',l:'Systems that talk'},
    {id:'marketing',l:'Pipeline that converts'},
    {id:'consulting',l:'Strategy & consulting'},
    {id:'fullstack',l:'Full-stack AI'}
  ];
  return h('nav',{style:{position:'sticky',top:0,zIndex:100,background:BG,borderBottom:`1px solid ${BRD}`}},
    h('div',{style:{maxWidth:1060,margin:'0 auto',padding:'0 28px',display:'flex',alignItems:'center',height:56,gap:28}},
      h('span',{onClick:()=>setPage('home'),style:{...montserrat,fontSize:17,fontWeight:800,cursor:'pointer',letterSpacing:'-0.02em',userSelect:'none'}},
        'Talently',h('span',{style:{color:A}},'.'), 'Global'
      ),
      h('div',{style:{flex:1}}),
      h('div',{style:{position:'relative'},onMouseEnter:()=>setOpen(true),onMouseLeave:()=>setOpen(false)},
        h('span',{style:{fontSize:13,color:MUT,cursor:'pointer',fontWeight:500,padding:'4px 0'}},'Solutions ↓'),
        open && h('div',{style:{position:'absolute',top:'100%',right:0,background:BG,border:`1px solid ${BRD}`,borderRadius:4,padding:'6px 0',minWidth:220,boxShadow:'0 12px 32px rgba(0,0,0,0.1)',zIndex:200}},
          sols.map(s=>h('div',{key:s.id,onClick:()=>{setPage(s.id);setOpen(false)},
            style:{padding:'9px 18px',fontSize:13,cursor:'pointer',color:TEXT,transition:'background 0.1s'},
            onMouseEnter:e=>{e.currentTarget.style.background=MID},
            onMouseLeave:e=>{e.currentTarget.style.background='transparent'}
          },s.l))
        )
      ),
      ['about','contact'].map(p=>h('span',{key:p,onClick:()=>setPage(p),
        style:{fontSize:13,color:page===p?TEXT:MUT,cursor:'pointer',fontWeight:500,textTransform:'capitalize',borderBottom:page===p?`1px solid ${TEXT}`:'none',paddingBottom:1}
      },p)),
      h('button',{onClick:()=>setPage('contact'),style:BTN},'Book a call')
    )
  );
}

function HomePage({setPage}){
  const [aud,setAud]=useState('founder');
  const activeAud=AUDIENCES.find(x=>x.id===aud);
  const W={maxWidth:1060,margin:'0 auto',padding:'0 28px'};

  return h('div',null,[
    // Hero
    h('section',{key:'hero',style:{padding:'72px 28px 80px',borderBottom:`1px solid ${BRD}`}},
      h('div',{style:{...W,maxWidth:1060}},
        h('h1',{style:{...montserrat,fontSize:44,fontWeight:800,lineHeight:1.1,marginBottom:6,maxWidth:700,color:TEXT}},HEADLINE.h1),
        h('h1',{style:{...montserrat,fontSize:44,fontWeight:800,lineHeight:1.1,marginBottom:28,maxWidth:700,color:A}},HEADLINE.accent),
        h('p',{style:{fontSize:17,lineHeight:1.7,color:MUT,maxWidth:560,marginBottom:36}},HEADLINE.sub),
        h('div',{style:{display:'flex',gap:12,flexWrap:'wrap'}},
          h('button',{onClick:()=>setPage('contact'),style:BTN},'Book a discovery call'),
          h('button',{onClick:()=>document.getElementById('outcomes-section')?.scrollIntoView({behavior:'smooth'}),style:BTNOUT},'See our solutions')
        )
      )
    ),

    // Proof strip
    h('section',{key:'proof',style:{padding:'20px 28px',borderBottom:`1px solid ${BRD}`,background:MID}},
      h('div',{style:{...W,display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}},
        ['22+ years across AI, data science & consulting','Deployed in regulated and high-growth industries','End-to-end: from strategy to live systems','Outcomes-first engagements — not time-and-materials'].map(p=>
          h('span',{key:p,style:{fontSize:12,color:MUT,padding:'4px 12px',background:BG,borderRadius:20,border:`1px solid ${BRD}`}},p)
        )
      )
    ),

    // Outcomes
    h('section',{key:'outcomes',id:'outcomes-section',style:{padding:'80px 28px',borderBottom:`1px solid ${BRD}`}},
      h('div',{style:W},
        h(Tag,null,'What we deliver'),
        h('h2',{style:{...montserrat,fontSize:34,fontWeight:700,marginTop:10,marginBottom:8,color:TEXT}},'Five outcomes. One partner.'),
        h('p',{style:{fontSize:16,color:MUT,marginBottom:40,maxWidth:500}},'We lead with results. The services behind each outcome are the method, not the message.'),
        h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:2}},
          OUTCOMES.map((o,i)=>h('div',{key:i,onClick:()=>setPage(o.page),
            style:{background:BG,border:`1px solid ${BRD}`,padding:'28px 22px',cursor:'pointer',transition:'background 0.15s'},
            onMouseEnter:e=>{e.currentTarget.style.background=MID},
            onMouseLeave:e=>{e.currentTarget.style.background=BG}
          },
            h('div',{style:{width:28,height:2,background:A,marginBottom:18}}),
            h('h3',{style:{...montserrat,fontSize:15,fontWeight:700,marginBottom:10,lineHeight:1.3,color:TEXT}},o.title),
            h('p',{style:{fontSize:13,color:MUT,lineHeight:1.6,marginBottom:18}},o.body),
            h('span',{style:{fontSize:12,color:A,fontWeight:500}},'Learn more →')
          ))
        )
      )
    ),

    // Audience switcher
    h('section',{key:'audience',style:{padding:'80px 28px',borderBottom:`1px solid ${BRD}`,background:DARK}},
      h('div',{style:W},
        h(Tag,{children:h('span',{style:{color:'rgba(248,247,243,0.5)'}},'Who are you?')}),
        h('h2',{style:{...montserrat,fontSize:34,fontWeight:700,marginTop:10,marginBottom:32,color:'#F8F7F3'}},'Different roles. Specific solutions.'),
        h('div',{style:{display:'flex',gap:8,marginBottom:32,flexWrap:'wrap'}},
          AUDIENCES.map(a=>h('button',{key:a.id,onClick:()=>setAud(a.id),
            style:{fontSize:12,fontWeight:500,padding:'7px 16px',borderRadius:2,cursor:'pointer',
              background:aud===a.id?'#F8F7F3':'transparent',
              color:aud===a.id?DARK:'rgba(248,247,243,0.55)',
              border:aud===a.id?'1px solid #F8F7F3':'1px solid rgba(248,247,243,0.2)'}
          },a.label))
        ),
        h('div',{style:{maxWidth:620}},
          h('h3',{style:{...montserrat,fontSize:22,fontWeight:700,color:'#F8F7F3',marginBottom:14}},activeAud.h),
          h('p',{style:{fontSize:16,lineHeight:1.75,color:'rgba(248,247,243,0.65)',marginBottom:28}},activeAud.b),
          h('button',{onClick:()=>setPage('contact'),style:BTNOUTDK},'Talk to us about this →')
        )
      )
    ),

    // Results
    h('section',{key:'results',style:{padding:'80px 28px',borderBottom:`1px solid ${BRD}`}},
      h('div',{style:W},
        h(Tag,null,'Results'),
        h('h2',{style:{...montserrat,fontSize:34,fontWeight:700,marginTop:10,marginBottom:40,color:TEXT}},'The outcomes speak for themselves.'),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:2,marginBottom:40}},
          [
            {metric:'40%',label:'Reduction in operational overhead',detail:'Mid-market logistics company after full enterprise system integration'},
            {metric:'3×',label:'Pipeline growth in 90 days',detail:'B2B SaaS firm using AI-assisted demand generation and attribution'},
            {metric:'60%',label:'Faster process cycle times',detail:'Professional services firm post AI agent deployment across intake workflows'},
            {metric:'8 wks',label:'Average time to first measurable result',detail:'Across AI agent and integration deployments — not months, weeks'}
          ].map((r,i)=>h('div',{key:i,style:{background:i%2===0?MID:BG,border:`1px solid ${BRD}`,padding:'28px 24px'}},
            h('div',{style:{...montserrat,fontSize:42,fontWeight:800,color:A,lineHeight:1,marginBottom:8}},r.metric),
            h('p',{style:{fontSize:14,fontWeight:500,color:TEXT,marginBottom:6}},r.label),
            h('p',{style:{fontSize:13,color:MUT,lineHeight:1.5}},r.detail)
          ))
        ),
        h('blockquote',{style:{borderLeft:`3px solid ${A}`,paddingLeft:20,marginBottom:8}},
          h('p',{style:{fontSize:16,fontStyle:'italic',color:TEXT,lineHeight:1.7,marginBottom:8}},'"We replaced three manual processes in under 60 days. The AI agents run overnight — our team walks in to completed work. It\'s fundamentally changed what we can accomplish with the same headcount."'),
          h('cite',{style:{fontSize:13,color:MUT,fontStyle:'normal'}},'— Operations Director, Professional Services Firm')
        )
      )
    ),

    // About teaser
    h('section',{key:'about-t',style:{padding:'80px 28px',borderBottom:`1px solid ${BRD}`}},
      h('div',{style:{...W,display:'grid',gridTemplateColumns:'1fr 1fr',gap:48,alignItems:'start'}},
        h('div',null,
          h(Tag,null,'Who we are'),
          h('h2',{style:{...montserrat,fontSize:32,fontWeight:700,marginTop:10,marginBottom:16,lineHeight:1.2,color:TEXT}},'Founded by operators. Built for outcomes.'),
          h('p',{style:{fontSize:16,color:MUT,lineHeight:1.75,marginBottom:24}},'Talently Global was founded by professionals with 22+ years of experience across data science, AI, clinical research, and enterprise consulting — in regulated industries where accuracy and accountability aren\'t optional.'),
          h('button',{onClick:()=>setPage('about'),style:BTNOUT},'Our story →')
        ),
        h('div',null,
          [
            {h:'We start with your outcome',b:'Every engagement begins with a clear definition of success — not a service catalog. We work backwards from the result to the right solution.'},
            {h:'We stay accountable to numbers',b:'We don\'t deliver decks and disappear. We measure outcomes and stay in the work until the metrics move.'},
            {h:'AI is the method, not the product',b:'We\'re not selling AI for AI\'s sake. We deploy it where it moves the needle — and skip it where it doesn\'t.'}
          ].map((v,i)=>h('div',{key:i,style:{marginBottom:24,paddingBottom:24,borderBottom:i<2?`1px solid ${BRD}`:'none'}},
            h('p',{style:{fontSize:14,fontWeight:500,color:TEXT,marginBottom:4}},v.h),
            h('p',{style:{fontSize:13,color:MUT,lineHeight:1.6}},v.b)
          ))
        )
      )
    ),

    // Final CTA
    h('section',{key:'cta',style:{padding:'80px 28px',background:DARK}},
      h('div',{style:{...W,display:'flex',flexDirection:'column',alignItems:'center',textAlign:'center'}},
        h('h2',{style:{...montserrat,fontSize:38,fontWeight:800,color:'#F8F7F3',marginBottom:14,maxWidth:560,lineHeight:1.15}},'Ready to close the gap?'),
        h('p',{style:{fontSize:16,color:'rgba(248,247,243,0.6)',marginBottom:36,maxWidth:460,lineHeight:1.7}},'Book a 30-minute discovery call. No deck, no pitch. Just a direct conversation about where you want to take your business and whether we\'re the right partner to get you there.'),
        h('div',{style:{display:'flex',gap:12,flexWrap:'wrap',justifyContent:'center'}},
          h('button',{onClick:()=>setPage('contact'),style:{...BTN,padding:'13px 32px',fontSize:14}},'Book a discovery call'),
          h('button',{onClick:()=>setPage('about'),style:BTNOUTDK},'Learn about us first')
        )
      )
    )
  ]);
}

function SolutionPage({id,setPage}){
  const d=SOLDATA[id];
  if(!d)return null;
  const W={maxWidth:1060,margin:'0 auto',padding:'0 28px'};
  const relatedSols=Object.keys(SOLDATA).filter(k=>k!==id);
  return h('div',null,[
    h('section',{key:'hero',style:{padding:'72px 28px 64px',borderBottom:`1px solid ${BRD}`}},
      h('div',{style:W},
        h(Tag,null,d.label),
        h('h1',{style:{...montserrat,fontSize:42,fontWeight:800,lineHeight:1.1,marginTop:12,marginBottom:20,maxWidth:640,color:TEXT}},d.h1),
        h('p',{style:{fontSize:18,color:MUT,lineHeight:1.7,maxWidth:540,marginBottom:32}},d.sub),
        h('button',{onClick:()=>setPage('contact'),style:BTN},'Talk to us about this')
      )
    ),
    h('section',{key:'ps',style:{padding:'72px 28px',borderBottom:`1px solid ${BRD}`}},
      h('div',{style:{...W,display:'grid',gridTemplateColumns:'1fr 1fr',gap:48}},
        h('div',null,
          h('div',{style:{width:32,height:2,background:A,marginBottom:20}}),
          h('h2',{style:{...montserrat,fontSize:24,fontWeight:700,marginBottom:14,lineHeight:1.3,color:TEXT}},d.problem.h),
          h('p',{style:{fontSize:15,color:MUT,lineHeight:1.75}},d.problem.b)
        ),
        h('div',null,
          h('div',{style:{width:32,height:2,background:TEXT,marginBottom:20}}),
          h('h2',{style:{...montserrat,fontSize:24,fontWeight:700,marginBottom:14,lineHeight:1.3,color:TEXT}},d.solution.h),
          h('p',{style:{fontSize:15,color:MUT,lineHeight:1.75}},d.solution.b)
        )
      )
    ),
    h('section',{key:'outs',style:{padding:'72px 28px',background:DARK,borderBottom:`1px solid rgba(248,247,243,0.1)`}},
      h('div',{style:{...W,display:'grid',gridTemplateColumns:'1fr 1fr',gap:48}},
        h('div',null,
          h(Tag,{children:h('span',{style:{color:'rgba(248,247,243,0.5)'}},'Outcomes')}),
          h('h2',{style:{...montserrat,fontSize:28,fontWeight:700,marginTop:12,marginBottom:24,color:'#F8F7F3'}},'What you get.'),
          d.outcomes.map((o,i)=>h('div',{key:i,style:{display:'flex',gap:12,marginBottom:16,alignItems:'flex-start'}},
            h('span',{style:{color:A,fontWeight:700,fontSize:18,lineHeight:1,marginTop:1}},'→'),
            h('p',{style:{fontSize:15,color:'rgba(248,247,243,0.75)',lineHeight:1.6}},o)
          ))
        ),
        h('div',null,
          h(Tag,{children:h('span',{style:{color:'rgba(248,247,243,0.5)'}},'Use Cases')}),
          h('h2',{style:{...montserrat,fontSize:28,fontWeight:700,marginTop:12,marginBottom:24,color:'#F8F7F3'}},'Common applications.'),
          d.uses.map((u,i)=>h('div',{key:i,style:{padding:'14px 0',borderBottom:'1px solid rgba(248,247,243,0.1)',fontSize:14,color:'rgba(248,247,243,0.65)',lineHeight:1.5}},u))
        )
      )
    ),
    h('section',{key:'related',style:{padding:'60px 28px',borderBottom:`1px solid ${BRD}`}},
      h('div',{style:W},
        h(Tag,null,'Other solutions'),
        h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:2,marginTop:20}},
          relatedSols.map(k=>h('div',{key:k,onClick:()=>setPage(k),
            style:{border:`1px solid ${BRD}`,padding:'20px 18px',cursor:'pointer',background:BG,transition:'background 0.15s'},
            onMouseEnter:e=>{e.currentTarget.style.background=MID},
            onMouseLeave:e=>{e.currentTarget.style.background=BG}
          },
            h('p',{style:{fontSize:13,fontWeight:500,color:TEXT,marginBottom:4,lineHeight:1.4}},SOLDATA[k].h1.replace('.',' ')),
            h('span',{style:{fontSize:12,color:A}},'Explore →')
          ))
        )
      )
    ),
    h('section',{key:'cta',style:{padding:'64px 28px',background:MID}},
      h('div',{style:{...W,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:24}},
        h('div',null,
          h('h2',{style:{...montserrat,fontSize:28,fontWeight:700,marginBottom:8,color:TEXT}},'Ready to move forward?'),
          h('p',{style:{fontSize:15,color:MUT}})
        ),
        h('button',{onClick:()=>setPage('contact'),style:{...BTN,padding:'13px 28px',fontSize:14}},'Book a discovery call')
      )
    )

function ContactPage(){
  const [form,setForm]=useState({name:'',email:'',company:'',need:''});
  const [sent,setSent]=useState(false);
  const [status,setStatus]=useState('');
  const W={maxWidth:1060,margin:'0 auto',padding:'0 28px'};
  const inp={width:'100%',padding:'10px 14px',fontSize:14,border:`1px solid ${BRD}`,borderRadius:2,background:BG,color:TEXT,fontFamily:"'Montserrat',sans-serif",outline:'none'};
  const handleSubmit=async(e)=>{
    e.preventDefault();
    if(form.name&&form.email){
      setStatus('Sending...');
      try{
        const response=await fetch('https://formspree.io/f/xeoadwvn',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify(form)
        });
        if(response.ok){
          setSent(true);
          setForm({name:'',email:'',company:'',need:''});
        }else{
          setStatus('Error sending message. Please try again.');
        }
      }catch(error){
        setStatus('Error sending message. Please try again.');
      }
    }
  };
  return h('div',null,[
    h('section',{key:'hero',style:{padding:'72px 28px 64px',borderBottom:`1px solid ${BRD}`}},
      h('div',{style:W},
        h(Tag,null,'Get in touch'),
        h('h1',{style:{...montserrat,fontSize:42,fontWeight:800,lineHeight:1.1,marginTop:12,marginBottom:16,color:TEXT}},'Book a discovery call.'),
        h('p',{style:{fontSize:17,color:MUT,lineHeight:1.7,maxWidth:480}},'30 minutes. No deck, no pitch. A direct conversation about your business, where you want to take it, and whether we\'re the right partner to help you get there.')
      )
    ),
    h('section',{key:'form',style:{padding:'64px 28px'}},
      h('div',{style:{...W,display:'grid',gridTemplateColumns:'1fr 1fr',gap:56,alignItems:'start'}},
        sent
        ? h('div',{style:{gridColumn:'1/-1',textAlign:'center',padding:'40px 0'}},
            h('div',{style:{width:40,height:2,background:A,margin:'0 auto 20px'}}),
            h('h2',{style:{...montserrat,fontSize:28,fontWeight:700,marginBottom:12,color:TEXT}},'We\'ll be in touch shortly.'),
            h('p',{style:{fontSize:15,color:MUT,lineHeight:1.7}},'Expect a response within one business day. We\'ll reach out to confirm a time that works for you.')
          )
        : h('form',{onSubmit:handleSubmit},
            h('h2',{style:{...montserrat,fontSize:22,fontWeight:700,marginBottom:24,color:TEXT}},'Tell us a little about what you\'re working on.'),
            h('div',{style:{marginBottom:16}},
              h('label',{style:{fontSize:12,fontWeight:500,color:MUT,display:'block',marginBottom:6}},'Full name *'),
              h('input',{type:'text',style:inp,value:form.name,onChange:e=>setForm({...form,name:e.target.value}),placeholder:'Your name',required:true})
            ),
            h('div',{style:{marginBottom:16}},
              h('label',{style:{fontSize:12,fontWeight:500,color:MUT,display:'block',marginBottom:6}},'Work email *'),
              h('input',{type:'email',style:inp,value:form.email,onChange:e=>setForm({...form,email:e.target.value}),placeholder:'you@company.com',required:true})
            ),
            h('div',{style:{marginBottom:16}},
              h('label',{style:{fontSize:12,fontWeight:500,color:MUT,display:'block',marginBottom:6}},'Company'),
              h('input',{type:'text',style:inp,value:form.company,onChange:e=>setForm({...form,company:e.target.value}),placeholder:'Your company'})
            ),
            h('div',{style:{marginBottom:28}},
              h('label',{style:{fontSize:12,fontWeight:500,color:MUT,display:'block',marginBottom:6}},'What are you trying to solve?'),
              h('textarea',{style:{...inp,height:120,resize:'vertical',lineHeight:1.6},value:form.need,onChange:e=>setForm({...form,need:e.target.value}),placeholder:'Tell us about your business challenge or what outcome you\'re trying to achieve...',required:true})
            ),
            h('button',{type:'submit',style:{...BTN,padding:'13px 32px',fontSize:14}},status||'Send — we\'ll follow up within 24 hours')
          ),
        h('div',null,
          [
            {h:'What to expect on the call',b:'We\'ll ask you about your current operations, where the friction is, and what winning looks like for you in the next 6–12 months. You\'ll leave with a clear point of view on whether and how we can help.'},
            {h:'No obligation',b:'We don\'t do high-pressure closes. If we\'re not the right fit, we\'ll tell you — and point you toward someone who is.'},
            {h:'Who you\'re talking to',b:'You\'ll speak directly with a senior member of the Talently Global team — not a sales rep or a BDR reading from a script.'},
            {h:'Turnaround',b:'We respond to all inquiries within one business day. Discovery calls are typically scheduled within the week.'}
          ].map((v,i)=>h('div',{key:i,style:{marginBottom:24,paddingBottom:24,borderBottom:i<3?`1px solid ${BRD}`:'none'}},
            h('p',{style:{fontSize:14,fontWeight:500,color:TEXT,marginBottom:5}},v.h),
            h('p',{style:{fontSize:13,color:MUT,lineHeight:1.6}},v.b)
          ))
        )
      )
    )
  ]);
}

function App(){
  const [page,setPage]=useState('home');
  useEffect(()=>{document.querySelector('#tg-app')?.scrollIntoView({behavior:'smooth',block:'start'})},[page]);

  const renderPage=()=>{
    if(page==='home') return h(HomePage,{setPage});
    if(page==='about') return h(AboutPage,{setPage});
    if(page==='contact') return h(ContactPage,{setPage});
    if(SOLDATA[page]) return h(SolutionPage,{id:page,setPage});
    return h(HomePage,{setPage});
  };

  return h('div',{className:'tg-root'},
    h(Nav,{page,setPage}),
    renderPage(),
    h(Footer,{setPage})
  );
}

ReactDOM.render(h(App), document.getElementById('tg-app'));
